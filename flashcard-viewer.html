<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mededge Arena | Alpotus 6.0</title>
    
    <link rel="stylesheet" href="style/style.css">
    <style>
        body { background: #0f172a; color: white; overflow: hidden; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* 1. TOP PROGRESS & TIMER */
        .timer-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 5px; 
            background: rgba(255,255,255,0.05); z-index: 2000; display: none;
        }
        #timer-bar { height: 100%; width: 100%; background: #6366f1; transition: width 0.1s linear; box-shadow: 0 0 10px #6366f1; }

        .arena-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1000; }
        .stats { display: flex; gap: 10px; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.5px; }
        .stats span { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }

        /* 2. THE 3D STAGE */
        .stage { 
            height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center;
            perspective: 1500px; padding: 20px;
        }
        
        .card-3d {
            width: 100%; max-width: 400px; height: 460px; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .card-3d.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0; backface-visibility: hidden;
            background: #ffffff; color: #1e293b; border-radius: 35px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px; text-align: center; box-shadow: 0 25px 60px -15px rgba(0,0,0,0.6);
            overflow-y: auto;
        }
        .face-back { transform: rotateY(180deg); background: #f8fafc; border: 2px solid #6366f1; }

        .card-source { font-size: 0.65rem; color: #6366f1; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        .card-text { font-size: 1.4rem; font-weight: 800; line-height: 1.4; color: #0f172a; }
        .card-img { max-width: 100%; max-height: 240px; border-radius: 18px; margin-top: 15px; border: 1px solid #e2e8f0; object-fit: contain; background: white; }

        /* 3. CLINICAL PEARL UI */
        .pearl-btn {
            position: absolute; top: 20px; right: 20px; width: 42px; height: 42px;
            background: #fef9c3; border: 1px solid #fde047; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(250, 204, 21, 0.2);
            z-index: 100; transition: 0.2s;
        }
        
        .pearl-box {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: #fefce8; border-top: 2px solid #fde047;
            padding: 22px; border-radius: 0 0 35px 35px; text-align: left;
            display: none; animation: slideUp 0.3s ease; z-index: 50;
        }
        .pearl-box h4 { margin: 0 0 5px 0; font-size: 0.7rem; color: #a16207; text-transform: uppercase; font-weight: 900; }
        .pearl-box p { margin: 0; font-size: 0.85rem; font-weight: 700; color: #713f12; line-height: 1.4; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* 4. SRS CONTROLS */
        .controls {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; display: none; grid-template-columns: repeat(3, 1fr); gap: 15px;
            z-index: 1000;
        }
        .srs-btn {
            border: none; padding: 22px 10px; border-radius: 22px; color: white;
            font-weight: 900; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-hard { background: #ef4444; }
        .btn-good { background: #3b82f6; }
        .btn-easy { background: #22c55e; }
        .srs-btn:active { transform: scale(0.94); }

        /* 5. COMPLETION REPORT */
        .report-overlay {
            position: fixed; inset: 0; background: #0f172a; z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .stat-circle { width: 130px; height: 130px; border: 8px solid #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; margin-bottom: 25px; box-shadow: 0 0 30px rgba(99,102,241,0.4); }

        @media (max-height: 700px) { .card-3d { height: 380px; } .card-text { font-size: 1.15rem; } .card-img { max-height: 170px; } }
    </style>
</head>
<body>

    <!-- BLITZ PROGRESS TIMER -->
    <div class="timer-container" id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <!-- ARENA HEADER -->
    <header class="arena-header">
        <button onclick="window.location.href='checkout.html'" style="background:rgba(255,255,255,0.1); border:none; color:white; width:42px; height:42px; border-radius:12px; font-size:1.2rem; cursor:pointer;">✕</button>
        <div class="stats">
            <span>REMAINING: <span id="count-left">0</span></span>
            <span style="color:#22c55e">DONE: <span id="count-done">0</span></span>
        </div>
    </header>

    <!-- 3D CARD STAGE -->
    <main class="stage">
        <div class="card-3d" id="main-card" onclick="flipCard()">
            <!-- FRONT -->
            <div class="card-face face-front">
                <div class="card-source" id="source-text">SUBJECT > TOPIC</div>
                <div class="card-text" id="front-text">Initializing Mededge Engine...</div>
                <div style="margin-top:40px; font-size:0.6rem; opacity:0.3; font-weight:900; letter-spacing:2px;">TAP TO FLIP</div>
            </div>

            <!-- BACK -->
            <div class="card-face face-back">
                <!-- PEARL LIGHTBULB -->
                <div class="pearl-btn" id="pearl-trigger" onclick="togglePearl(event)">💡</div>
                
                <div class="card-source">ACTIVE RECALL ANSWER</div>
                <div class="card-text" id="back-text">...</div>
                <div id="image-container"></div>
                
                <div style="margin-top:auto; font-size:0.6rem; opacity:0.3; font-weight:900; letter-spacing:1px;">SELECT DIFFICULTY</div>

                <!-- CLINICAL PEARL BOX -->
                <div class="pearl-box" id="pearl-content">
                    <h4>Clinical Pearl</h4>
                    <p id="pearl-text"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- SRS DIFFICULTY CONTROLS -->
    <div class="controls" id="srs-controls">
        <button class="srs-btn btn-hard" onclick="handleSRS('hard')">HARD<br><small>Soon</small></button>
        <button class="srs-btn btn-good" onclick="handleSRS('good')">GOOD<br><small>Later</small></button>
        <button class="srs-btn btn-easy" onclick="handleSRS('easy')">EASY<br><small>Mastered</small></button>
    </div>

    <!-- SESSION REPORT -->
    <div id="report-screen" class="report-overlay">
        <div class="stat-circle" id="final-acc">0%</div>
        <h1 style="margin:0; font-size: 1.8rem; letter-spacing: -0.5px;">Session Optimized</h1>
        <p id="session-summary" style="color:#94a3b8; margin: 15px 0 40px 0; font-weight:600; line-height:1.6; max-width: 300px;">SRS algorithm updated.</p>
        <button style="width:100%; max-width:280px; background:#6366f1; color:white; border:none; padding:20px; border-radius:20px; font-weight:900; font-size:1.1rem; cursor:pointer; box-shadow: 0 10px 20px rgba(99,102,241,0.3);" onclick="window.location.href='flashcards.html'">RETURN TO HUB</button>
    </div>

    <!-- 1. DATA INITIALIZATION -->
    <script src="js/data-init.js"></script>
    
    <!-- 2. ALL 19 SUBJECT DATA FILES (Crucial for Arena to work) -->
    <script src="js/subjects/anatomy.js"></script>
    <script src="js/subjects/physiology.js"></script>
    <script src="js/subjects/biochemistry.js"></script>
    <script src="js/subjects/pathology.js"></script>
    <script src="js/subjects/microbiology.js"></script>
    <script src="js/subjects/pharmacology.js"></script>
    <script src="js/subjects/forensic.js"></script>
    <script src="js/subjects/psm.js"></script>
    <script src="js/subjects/ent.js"></script>
    <script src="js/subjects/ophthalmology.js"></script>
    <script src="js/subjects/medicine.js"></script>
    <script src="js/subjects/surgery.js"></script>
    <script src="js/subjects/obg.js"></script>
    <script src="js/subjects/pediatrics.js"></script>
    <script src="js/subjects/orthopedics.js"></script>
    <script src="js/subjects/dermatology.js"></script>
    <script src="js/subjects/psychiatry.js"></script>
    <script src="js/subjects/radiology.js"></script>
    <script src="js/subjects/anesthesia.js"></script>

    <!-- 3. VOID/CUSTOM DATA -->
    <script src="js/flashcardsData.js"></script>

    <!-- 4. ENGINES -->
    <script src="js/srs-core.js"></script>
    <script src="js/viewer-engine.js"></script>
    
    <!-- 4. ENGINES -->
    
    <script src="js/seo-engine.js"></script>
    <script src="js/flashcard-hub.js"></script>
</body>
</html>
