<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mededge | Session Checkout</title>
    
    <link rel="stylesheet" href="style/style.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #1e293b;
            --bg: #f8fafc;
            --success: #22c55e;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px 20px 140px 20px; /* Space for the fixed launch button */
            color: var(--secondary); 
            min-height: 100vh;
            overflow-y: auto; 
        }
        
        .checkout-container { max-width: 600px; margin: 0 auto; }

        header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { background: #fff; border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        h1 span { color: var(--primary); }

        .section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 12px; display: block; letter-spacing: 0.5px; }

        /* Cart List */
        .cart-list { background: #fff; border-radius: 20px; padding: 10px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .cart-item:last-child { border-bottom: none; }
        .item-info h4 { margin: 0; font-size: 1rem; font-weight: 800; }
        .item-info p { margin: 0; font-size: 0.75rem; color: #64748b; font-weight: 600; margin-top: 2px; }
        .remove-item { color: #ef4444; border: none; background: #fef2f2; width: 32px; height: 32px; border-radius: 8px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Due Suggestions */
        .due-box { background: #e0e7ff; border: 2px dashed var(--primary); border-radius: 22px; padding: 20px; margin-bottom: 25px; }
        .due-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-add-due { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(99,102,241,0.2); }

        /* Mode Selection */
        .modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .mode-card { 
            background: #fff; border: 2px solid #fff; border-radius: 20px; padding: 18px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .mode-card.active { border-color: var(--primary); background: #f5f3ff; }
        .mode-card h4 { margin: 0 0 5px 0; font-size: 0.95rem; font-weight: 800; }
        .mode-card p { margin: 0; font-size: 0.7rem; color: #64748b; line-height: 1.4; font-weight: 600; }

        /* Modern Toggle Switch */
        .option-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Fixed Footer Launch */
        .launch-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 20px; border-top: 1px solid var(--border);
            z-index: 1000; display: flex; justify-content: center;
        }
        .btn-launch { 
            background: var(--primary); color: #fff; border: none; 
            width: 100%; max-width: 500px; padding: 18px; border-radius: 18px; 
            font-size: 1.1rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .empty-state { text-align: center; padding: 50px 20px; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>

    <div class="checkout-container">
        <header>
            <button class="back-btn" onclick="window.location.href='flashcards.html'">←</button>
            <h1>Mededge <span>Session</span></h1>
        </header>

        <!-- 1. Topics Summary -->
        <label class="section-title">In your study cart</label>
        <div id="cart-items" class="cart-list">
            <!-- Rendered by checkout-logic.js -->
        </div>

        <!-- 2. Spaced Repetition Due -->
        <div id="due-suggestion" class="due-box" style="display: none;">
            <div class="due-header">
                <div>
                    <h4 style="margin:0; font-size: 1rem; font-weight: 900; color: #1e1b4b;">Due for Review</h4>
                    <p style="margin:0; font-size: 0.75rem; color: #4338ca; font-weight: 600;">You have <span id="total-due-count">0</span> cards waiting.</p>
                </div>
                <button class="btn-add-due" onclick="addDueToCart()">ADD ALL</button>
            </div>
        </div>

        <!-- 3. Modes -->
        <label class="section-title">Select Intensity</label>
        <div class="modes-grid">
            <div class="mode-card active" id="mode-standard" onclick="setMode('standard')">
                <h4>Standard</h4>
                <p>Classic active recall. Focus on accuracy.</p>
            </div>
            <div class="mode-card" id="mode-blitz" onclick="setMode('blitz')">
                <h4>Blitz 🔥</h4>
                <p>5s per card. High pressure for exams.</p>
            </div>
        </div>

        <!-- 4. Logic Options -->
        <label class="section-title">Session Logic</label>
        <div class="cart-list">
            <div class="option-row">
                <div class="item-info">
                    <h4>Review Due Only</h4>
                    <p>Filters cart to only show cards due now.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="due-only-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Fixed Action -->
    <div class="launch-footer">
        <button class="btn-launch" onclick="launchArena()">START ARENA →</button>
    </div>

    <!--     <!-- 1. CORE DATA INITIALIZATION -->
    <script src="js/data-init.js"></script>
    
    <!-- 2. SPLIT SUBJECT DATA (ALL 19) -->
    <!-- Pre-clinical -->
    <script src="js/subjects/anatomy.js"></script>
    <script src="js/subjects/physiology.js"></script>
    <script src="js/subjects/biochemistry.js"></script>
    <!-- Para-clinical -->
    <script src="js/subjects/pathology.js"></script>
    <script src="js/subjects/microbiology.js"></script>
    <script src="js/subjects/pharmacology.js"></script>
    <script src="js/subjects/forensic.js"></script>
    <script src="js/subjects/psm.js"></script>
    <!-- Clinical -->
    <script src="js/subjects/ent.js"></script>
    <script src="js/subjects/ophthalmology.js"></script>
    <script src="js/subjects/medicine.js"></script>
    <script src="js/subjects/surgery.js"></script>
    <script src="js/subjects/obg.js"></script>
    <script src="js/subjects/pediatrics.js"></script>
    <script src="js/subjects/orthopedics.js"></script>
    <script src="js/subjects/dermatology.js"></script>
    <script src="js/subjects/psychiatry.js"></script>
    <script src="js/subjects/radiology.js"></script>
    <script src="js/subjects/anesthesia.js"></script>

    <!-- 3. VOID / CUSTOM DATA -->
    <script src="js/flashcardsData.js"></script>

    <!-- 4. ENGINES -->
    <script src="js/srs-core.js"></script>
    <script src="js/seo-engine.js"></script>
    <script src="js/flashcard-hub.js"></script>
    <script src="js/checkout-logic.js"></script>

</body>
</html>
