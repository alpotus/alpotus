<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Engine | Alpotus 5.0</title>
    
    <!-- REQUIRED DEPENDENCIES -->
    <link rel="stylesheet" href="qbank.css">
    <script src="cart-logic.js"></script>

    <style>
        /* Engine Specific Layout */
        .quiz-ui-container { max-width: 750px; margin: 0 auto; padding: 15px; }
        
        /* Stats & Progress */
        .q-meta-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 800; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .progress-track { height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-thumb { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        /* Question & Options */
        .question-text { font-size: 1.3rem; font-weight: 800; line-height: 1.5; color: var(--text); margin-bottom: 25px; }
        #q-image-container { width: 100%; margin-bottom: 25px; display: none; text-align: center; }
        .quiz-img { max-width: 100%; max-height: 380px; border-radius: 20px; border: 2px solid var(--border); box-shadow: var(--card-shadow); }

        /* Rationale Box */
        #explanation-box { display: none; margin-top: 25px; padding: 25px; border-radius: 20px; background: white; border-left: 6px solid var(--primary); box-shadow: var(--card-shadow); }
        
        /* Analysis Table */
        .analysis-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; }
        .analysis-table th { background: var(--primary-light); color: var(--primary-dark); padding: 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; }
        .analysis-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; font-weight: 700; }
        .stat-badge { padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        .bg-green { background: #dcfce7; color: #166534; }
        .bg-red { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body style="background-color: var(--bg-alt);">

    <div class="quiz-ui-container">
        
        <!-- PART 1: THE PLAYER -->
        <div id="quiz-ui">
            <div class="q-meta-bar">
                <span id="q-breadcrumb">Initializing...</span>
                <span id="q-timer" style="color:var(--primary); font-family:monospace;">00:00</span>
            </div>

            <div class="progress-track">
                <div id="progress-bar" class="progress-thumb"></div>
            </div>

            <div id="question-area">
                <h2 id="question-text" class="question-text">Preparing Clinical Case...</h2>
                
                <div id="q-image-container">
                    <img id="q-image" src="" class="quiz-img" alt="Clinical Illustration">
                </div>

                <div id="options-list">
                    <!-- Options injected here -->
                </div>
            </div>

            <div id="explanation-box">
                <h4 style="color:var(--primary); margin-bottom:10px; font-weight:900; font-size:0.8rem; text-transform:uppercase;">Rationale</h4>
                <p id="explanation-text" style="color:var(--text); line-height:1.6;"></p>
                <button onclick="nextQuestion()" class="v5-button" style="width:100%; margin-top:20px;">NEXT QUESTION →</button>
            </div>
        </div>

        <!-- PART 2: THE RESULTS -->
        <div id="result-ui" style="display:none;">
            <div style="text-align:center; padding:40px 0;">
                <h1 style="font-size:2.5rem; font-weight:950; letter-spacing:-1px;">Session <span style="color:var(--primary);">Analysis</span></h1>
                <p style="color:var(--text-muted);">Topic-wise clinical performance report.</p>
            </div>

            <div id="topic-analysis-render"></div>

            <div style="margin-top:30px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button onclick="location.reload()" class="v5-button" style="background:var(--text);">RETRY SESSION</button>
                <button onclick="finishSession()" class="v5-button">FINISH & CLEAR CART</button>
            </div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let questions = [];
        let currentIndex = 0;
        let sessionStats = {}; 
        let qStartTime, timerInterval;

        window.onload = () => {
            const mode = urlParams.get('mode');
            let cartItems = [];

            if (mode === 'multi') {
                cartItems = JSON.parse(decodeURIComponent(urlParams.get('data')));
            } else {
                cartItems = [{ sub: urlParams.get('sub'), unit: urlParams.get('unit'), topic: urlParams.get('topic') }];
            }
            loadDataSequentially(cartItems);
        };

        // Loads multiple subjects without overwriting RawInput
        async function loadDataSequentially(cartItems) {
            const subjectsNeeded = [...new Set(cartItems.map(i => i.sub))];
            
            for (let subId of subjectsNeeded) {
                await new Promise((resolve) => {
                    const s = document.createElement('script');
                    s.src = `data/qbank/${subId}.js?v=${Math.random()}`;
                    document.head.appendChild(s);
                    s.onload = () => {
                        processInput(subId, cartItems);
                        resolve();
                    };
                });
            }
            startQuiz();
        }

        function processInput(subId, cartItems) {
            if (!window.RawInput) return;
            const lines = window.RawInput.split('\n');
            const targetTopics = cartItems.filter(item => item.sub === subId);

            targetTopics.forEach(item => {
                const filtered = lines.filter(l => l.includes(`UNIT=${item.unit}`) && l.includes(`TOPIC=${item.topic}`));
                filtered.forEach(line => {
                    const q = parseLine(line);
                    q.topicLabel = item.topic.replace(/-/g, ' ');
                    questions.push(q);
                    if (!sessionStats[q.topicLabel]) sessionStats[q.topicLabel] = { correct: 0, total: 0, time: 0 };
                    sessionStats[q.topicLabel].total++;
                });
            });
            window.RawInput = ""; // Prevent data pollution
        }

        function parseLine(line) {
            const obj = {};
            const keys = ["UNIT", "TOPIC", "Q", "IMG", "O1", "O2", "O3", "O4", "ANS", "EXP"];
            keys.forEach((key, i) => {
                const token = `${key}=`;
                if (line.includes(token)) {
                    const start = line.indexOf(token) + token.length;
                    let end = line.length;
                    for (let j = i + 1; j < keys.length; j++) {
                        if (line.includes(`${keys[j]}=`)) { end = line.indexOf(`${keys[j]}=`); break; }
                    }
                    obj[key] = line.substring(start, end).trim();
                }
            });
            if (!obj.IMG) obj.IMG = 'none';
            return obj;
        }

        function startQuiz() {
            if (questions.length === 0) {
                document.getElementById('question-text').innerText = "Data error: No questions loaded.";
                return;
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('q-breadcrumb').innerText = `${q.topicLabel} | ${currentIndex + 1} OF ${questions.length}`;
            document.getElementById('question-text').innerText = q.Q.replace(/-/g, ' ');
            document.getElementById('progress-bar').style.width = `${(currentIndex / questions.length) * 100}%`;

            // Image Handler
            const imgBox = document.getElementById('q-image-container');
            const imgTag = document.getElementById('q-image');
            if (q.IMG && q.IMG !== 'none' && q.IMG !== '') {
                imgBox.style.display = 'block';
                imgTag.src = q.IMG.startsWith('http') ? q.IMG : `assets/qbank-img/${q.IMG}`;
            } else { imgBox.style.display = 'none'; }

            // Options Handler
            let html = "";
            [1,2,3,4].forEach(n => {
                html += `<button class="option-btn" onclick="handleChoice(this, ${n})">${q['O'+n].replace(/-/g, ' ')}</button>`;
            });
            document.getElementById('options-list').innerHTML = html;
            qStartTime = Date.now();
            runTimer();
        }

        function runTimer() {
            let sec = 0; clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                sec++;
                document.getElementById('q-timer').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
            }, 1000);
        }

        function handleChoice(btn, choice) {
            clearInterval(timerInterval);
            const q = questions[currentIndex];
            sessionStats[q.topicLabel].time += Math.floor((Date.now() - qStartTime) / 1000);
            
            const all = document.querySelectorAll('.option-btn');
            all.forEach(b => b.style.pointerEvents = 'none');

            if (choice == q.ANS) {
                btn.classList.add('correct');
                sessionStats[q.topicLabel].correct++;
            } else {
                btn.classList.add('wrong');
                all[q.ANS - 1].classList.add('correct');
            }
            document.getElementById('explanation-text').innerText = q.EXP.replace(/-/g, ' ');
            document.getElementById('explanation-box').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) renderQuestion();
            else renderResults();
        }

        function renderResults() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            let html = `<table class="analysis-table"><thead><tr><th>Topic</th><th>Score</th><th>Time</th><th>%</th></tr></thead><tbody>`;
            for (let t in sessionStats) {
                const s = sessionStats[t];
                const p = Math.round((s.correct / s.total) * 100);
                html += `<tr><td>${t}</td><td>${s.correct}/${s.total}</td><td>${s.time}s</td><td><span class="stat-badge ${p >= 70 ? 'bg-green' : 'bg-red'}">${p}%</span></td></tr>`;
            }
            document.getElementById('topic-analysis-render').innerHTML = html + `</tbody></table>`;
        }

        function finishSession() {
            if(typeof CartLogic !== 'undefined') CartLogic.clear();
            location.href = 'mbbsqbank.html';
        }
    </script>
</body>
</html>
